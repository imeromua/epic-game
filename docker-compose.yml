version: "3.9"

services:

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: epicteam_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: epicteam_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI бекенд
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: epicteam_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Telegram бот
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: epicteam_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
      - redis
    volumes:
      - ./bot:/app
    command: python main.py

  # APScheduler
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: epicteam_scheduler
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
      - redis
      - db
    volumes:
      - ./scheduler:/app
    command: python main.py

volumes:
  postgres_data:
  redis_data:
