version: "3.9"

services:

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: epicteam_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: epicteam_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI бекенд
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: epicteam_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"

  # Telegram MiniApp (React/Nginx)
  miniapp:
    build:
      context: ./miniapp
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${MINIAPP_API_URL:-https://your-api-host.com}
    container_name: epicteam_miniapp
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  # Telegram бот
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: epicteam_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
      - redis
    command: python -m bot.main

  # APScheduler
  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: epicteam_scheduler
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
      - redis
      - db
    command: python -m scheduler.main

volumes:
  postgres_data:
  redis_data:
